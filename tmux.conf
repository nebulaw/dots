#~ tmux.conf


# --- Theme ---
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# --- Basic settings ---
setw -g mouse on
setw -g mode-keys vi
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g repeat-time 0
set -g focus-events on
set -g status-justify "left"
set -g set-titles on
set -g set-titles-string "#T"
# set -g pane-active-border-style fg=colour166,bg=default
set -g window-style fg=colour10,bg=default
set -g window-active-style fg=colour12,bg=default
set -g history-limit 64096
set -sg escape-time 10
if-shell "uname -s | grep -q Darwin" {
    set -g default-command "which reattach-to-user-namespace > /dev/null && reattach-to-user-namespace -l $SHELL || $SHELL"
    set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
    set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
}

# --- Keybindings ---
# Resizing pane
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5
# Splitting
bind -r | split-window -h
bind -r - split-window -v
# Hiding and joining
bind ! break-pane -d -n _hidden_pane
bind @ join-pane -s $.0
# Reload settings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
# Open current directory
bind o run-shell "open '#{pane_current_path}'"
bind -r e kill-pane -a
# Moving window
bind -n C-S-Left swap-window -t -1 \; previous-window
bind -n C-S-Right swap-window -t +1 \; next-window
if-shell "command -v lazygit > /dev/null 2>&1" {
    bind -r g display-popup -d '#{pane_current_path}' -w94% -h80% -E "lazygit"
}


# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'jimeh/tmux-themepack'
# set -g @plugin 'tmux-plugins/tmux-pain-control'

set -g mode-style "fg=#eee8d5,bg=#073642"
set -g message-style "fg=#eee8d5,bg=#073642"
set -g message-command-style "fg=#eee8d5,bg=#073642"
set -g pane-border-style "fg=#073642"
set -g pane-active-border-style "fg=#eee8d5"
set -g status "on"
set -g status-interval 1
set -g status-justify "left"
set -g status-style "fg=#586e75,bg=#072121"
set -g status-bg "#00101c"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE
set -g status-left "#[fg=#073642,bg=#eee8d5,bold] #S:#I.#P #[fg=#eee8d5,bg=#93a1a1,nobold,nounderscore,noitalics]#[fg=#15161E,bg=#93a1a1,bold] #(whoami) #[fg=#93a1a1,bg=#00101c]"
set -g status-right "#[fg=#586e75,bg=#00101c,nobold,nounderscore,noitalics]#[fg=#93a1a1,bg=#586e75]#[fg=#657b83,bg=#586e75,nobold,nounderscore,noitalics]#[fg=#93a1a1,bg=#657b83]#[fg=#93a1a1,bg=#657b83,nobold,nounderscore,noitalics]#[fg=#15161E,bg=#93a1a1,bold] #h "
setw -g window-status-activity-style "underscore,fg=#839496,bg=#00101c"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#839496,bg=#00101c"
setw -g window-status-format '#[fg=#00101c,bg=#00101c]#[fg=#839496,bg=#00101c] #I  #[fg=#839496,,bg=#00101c]#W #[fg=#00101c,bg=#00101c,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#00101c,bg=#333333]#[fg=#eee8d5,bg=#333333] #I #[fg=#333333,bg=#eee8d5,bold] #[fg=#333333,bg=#eee8d5,bold]#{b:pane_current_path} #[fg=#eee8d5,bg=#00101c]'

run '~/.tmux/plugins/tpm/tpm'
